<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abonelikten Çık - GDG on Campus Yaşar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 16px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .email {
            font-weight: bold;
            color: #333;
        }
        form {
            margin-top: 20px;
        }
        button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover {
            background: #c82333;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Abonelikten Çık</h1>
        <p>
            <span class="email">{email}</span> adresine gönderilen
            e-postalardan çıkmak üzeresiniz.
        </p>
        <p>Bu işlem geri alınamaz. Devam etmek istiyor musunuz?</p>
        <form method="POST">
            <button type="submit">Abonelikten Çık</button>
        </form>
        <p class="footer">GDG on Campus Yaşar University</p>
    </div>
</body>
</html>
