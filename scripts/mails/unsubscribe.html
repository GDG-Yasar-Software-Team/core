<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>GDG On Campus – Abonelik Yönetimi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom right, #f0f9ff, #fef3f2);
      padding: 20px;
    }

    .card {
      background: white;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #666;
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .blue { background: #4285F4; }
    .red { background: #DB4437; }
    .yellow { background: #F4B400; }
    .green { background: #0F9D58; }

    h1 {
      font-size: 24px;
      color: #1f2937;
      margin-bottom: 15px;
    }

    p {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .email {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      background: #dbeafe;
      color: #3b82f6;
      font-weight: 500;
      margin-top: 5px;
    }

    label {
      display: block;
      margin: 20px 0 8px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      background: #f9fafb;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #93c5fd;
      background: white;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-keep {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }

    .btn-leave {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .success {
      background: #d1fae5;
      color: #065f46;
      border: 2px solid #a7f3d0;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 2px solid #fecaca;
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 20px;
      }
      
      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="brand">
      <div class="dots">
        <span class="dot blue"></span>
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <span>GDG On Campus – Yaşar Üniversitesi</span>
    </div>

    <h1>Abonelikten Çıkmak İstediğinize Emin misiniz?</h1>

    <p>
      E-posta adresiniz: <span id="email" class="email">example@mail.com</span>
    </p>

    <p>
      Aboneliğinizi sonlandırırsanız, topluluk duyurularından ve etkinliklerden haberdar olamayacaksınız.
    </p>

    <label for="reason">Neden ayrılmak istiyorsunuz? (opsiyonel)</label>
    <select id="reason">
      <option value="">Bir seçenek belirleyin</option>
      <option value="too_many">Çok fazla e-posta alıyorum</option>
      <option value="not_relevant">İçerik bana uygun değil</option>
      <option value="mistake">Yanlışlıkla abone oldum</option>
      <option value="other_email">Farklı bir e-posta kullanıyorum</option>
      <option value="other">Diğer</option>
    </select>

    <div class="buttons">
      <button id="keepBtn" class="btn-keep">Kalmak İstiyorum</button>
      <button id="leaveBtn" class="btn-leave">Abonelikten Çık</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email") || "example@mail.com";
    document.getElementById("email").textContent = email;

    const reasonSelect = document.getElementById("reason");
    const messageEl = document.getElementById("message");
    const keepBtn = document.getElementById("keepBtn");
    const leaveBtn = document.getElementById("leaveBtn");

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = `message ${type} show`;
    }

    leaveBtn.addEventListener("click", async () => {
      keepBtn.disabled = true;
      leaveBtn.disabled = true;
      leaveBtn.textContent = "İşleniyor...";

      try {
        const response = await fetch("/api/unsubscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: email,
            reason: reasonSelect.value || null
          })
        });

        if (response.ok) {
          showMessage("✓ Aboneliğiniz başarıyla sonlandırıldı.", "success");
          document.querySelector(".buttons").style.display = "none";
          reasonSelect.disabled = true;
        } else {
          const data = await response.json().catch(() => ({}));
          showMessage("⚠ " + (data.message || "Bir hata oluştu."), "error");
          keepBtn.disabled = false;
          leaveBtn.disabled = false;
          leaveBtn.textContent = "Abonelikten Çık";
        }
      } catch (err) {
        showMessage("⚠ Sunucuya ulaşılamadı. Lütfen tekrar deneyin.", "error");
        keepBtn.disabled = false;
        leaveBtn.disabled = false;
        leaveBtn.textContent = "Abonelikten Çık";
      }
    });

    keepBtn.addEventListener("click", () => {
      showMessage("💚 Harika! Topluluğumuzun bir parçası olmaya devam ediyorsunuz.", "success");
      setTimeout(() => {
        window.location.href = "https://gdg.community.dev/gdg-on-campus-yasar-universitesi-izmir-turkey/";
      }, 2000);
    });
  </script>
</body>
</html>
