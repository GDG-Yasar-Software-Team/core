name: Frontend Check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "biome.json"
      - ".github/workflows/frontend-check.yaml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "biome.json"
      - ".github/workflows/frontend-check.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Biome
        run: bun add -g @biomejs/biome@2.4.10

      - name: Run Biome Check
        run: biome check frontend/
