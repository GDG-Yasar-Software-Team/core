name: Test Mail Service

on:
  push:
    branches: [main]
    paths:
      - "services/mail/**"
      - ".github/workflows/mail-service-tests.yml"
  pull_request:
    paths:
      - "services/mail/**"
      - ".github/workflows/mail-service-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          cd services/mail
          uv sync --all-extras

      - name: Lint
        run: |
          cd services/mail
          uv run ruff check .

      - name: Run tests
        run: |
          cd services/mail
          uv run pytest -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: services/mail/coverage.xml
          flags: mail-service
          fail_ci_if_error: false
