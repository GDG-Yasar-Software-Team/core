name: Test User Service

on:
  push:
    branches: [main]
    paths:
      - "services/user/**"
      - ".github/workflows/test-user-service.yaml"
  pull_request:
    paths:
      - "services/user/**"
      - ".github/workflows/test-user-service.yaml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          cd services/user
          uv sync --all-extras

      - name: Lint
        run: |
          cd services/user
          uv run ruff check .

      - name: Run tests
        run: |
          make test-user-service
